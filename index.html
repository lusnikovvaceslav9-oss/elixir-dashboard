<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ELIXIR Dashboard</title>

    // Сохраняем hash/query при редиректе (meta refresh их теряет).
    location.replace('elixir.html' + location.search + location.hash);
  </script>
</head>
<body>
  <p><a id="go" href="elixir.html">ELIXIR Dashboard</a></p>

    document.getElementById('go').href = 'elixir.html' + location.search + location.hash;
  </script>
</body>
</html>
