name: Hupp data feed

on:
  schedule:
    - cron: "20 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [hupp-csv-upload]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install feed dependencies
        run: pip install -r scripts/hupp-feed/requirements.txt

      - name: Run Hupp feed (Metrika only)
        env:
          HUPP_METRIKA_OAUTH_TOKEN: ${{ secrets.HUPP_METRIKA_OAUTH_TOKEN }}
          HUPP_METRIKA_COUNTER_ID: ${{ secrets.HUPP_METRIKA_COUNTER_ID }}
        run: python scripts/hupp-feed/__main__.py --work-dir .

      - name: Commit updated Hupp data
        run: |
          git config user.name "Hupp Feed Bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git add data/hupp-daily.csv data/hupp-meta.json
          if git diff --staged --quiet; then
            echo "No Hupp data changes"
            exit 0
          fi
          git commit -m "chore: auto-update Hupp feed data"
          git push origin HEAD:main
