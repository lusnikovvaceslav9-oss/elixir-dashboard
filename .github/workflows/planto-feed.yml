name: Planto data feed

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/buyer-feed/requirements.txt

      - name: Run Planto feed
        env:
          APPMETRICA_OAUTH_TOKEN: ${{ secrets.APPMETRICA_OAUTH_TOKEN }}
          APPMETRICA_APPLICATION_ID: ${{ secrets.APPMETRICA_APPLICATION_ID }}
          DIRECT_OAUTH_TOKEN: ${{ secrets.DIRECT_OAUTH_TOKEN }}
          DIRECT_CLIENT_LOGIN: ${{ secrets.DIRECT_CLIENT_LOGIN }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          cd scripts/buyer-feed
          python __main__.py --work-dir ../..

      - name: Commit updated data
        run: |
          git config user.name "Planto Feed Bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git add data/planto-daily.csv data/planto-cohort.json data/planto-meta.json data/planto-feed-state.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "chore: auto-update Planto feed [skip ci]"
            git push
          fi
